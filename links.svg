<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140" width="700" height="140">
  <style>
    @keyframes coin-spin {
      0%, 100% { transform: scaleX(1); }
      25% { transform: scaleX(0.3); }
      50% { transform: scaleX(1); }
      75% { transform: scaleX(0.3); }
    }
    @keyframes block-bump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes float-coin {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-6px); opacity: 0.7; }
    }

    .coin { animation: coin-spin 2s ease-in-out infinite; }
    .coin-delay1 { animation-delay: 0.3s; }
    .coin-delay2 { animation-delay: 0.6s; }
    .block { animation: block-bump 4s ease-in-out infinite; }
    .block-d1 { animation-delay: 1s; }
    .block-d2 { animation-delay: 2s; }
    .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    .sparkle-d1 { animation-delay: 0.5s; }
    .sparkle-d2 { animation-delay: 1s; }
    .float-coin { animation: float-coin 3s ease-in-out infinite; }

    .link-text { font-family: 'Press Start 2P', 'Courier New', monospace; font-size: 9px; }
    .pixel { image-rendering: pixelated; }
  </style>

  <!-- Background -->
  <rect width="700" height="140" fill="#0d1117" rx="8" />

  <!-- Ground blocks at bottom -->
  <g fill="#8B4513">
    <rect x="0" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="20" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="40" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="60" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="80" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="100" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="120" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="140" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="160" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="180" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="200" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="220" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="240" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="260" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="280" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="300" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="320" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="340" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="360" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="380" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="400" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="420" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="440" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="460" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="480" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="500" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="520" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="540" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="560" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="580" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="600" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="620" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="640" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="660" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
    <rect x="680" y="120" width="20" height="20" stroke="#6B3410" stroke-width="1" />
  </g>

  <!-- PIPE 1 — Portfolio (left) -->
  <g class="block">
    <!-- Pipe rim -->
    <rect x="80" y="68" width="60" height="16" rx="3" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="2" />
    <!-- Pipe body -->
    <rect x="86" y="84" width="48" height="36" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="2" />
    <!-- Pipe shine -->
    <rect x="92" y="70" width="8" height="12" fill="#7FDBCA" opacity="0.5" rx="1" />
    <rect x="92" y="86" width="8" height="30" fill="#7FDBCA" opacity="0.3" rx="1" />
  </g>
  <!-- Floating coin above pipe 1 -->
  <g class="float-coin" transform-origin="110 50">
    <g class="coin" transform-origin="110 50">
      <ellipse cx="110" cy="50" rx="10" ry="10" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
      <text x="110" y="55" font-family="monospace" font-size="12" font-weight="bold" fill="#C4722A" text-anchor="middle">P</text>
    </g>
  </g>
  <!-- Label -->
  <text x="110" y="15" class="link-text" fill="#2DD4A8" text-anchor="middle">PORTFOLIO</text>
  <!-- Sparkle -->
  <text class="sparkle" x="130" y="40" font-size="8" fill="#E8C547">✦</text>

  <!-- QUESTION BLOCK 2 — LinkedIn (center) -->
  <g class="block block-d1">
    <!-- Block body -->
    <rect x="305" y="68" width="40" height="40" rx="3" fill="#E8C547" stroke="#C4722A" stroke-width="2" />
    <!-- Block inner border -->
    <rect x="310" y="73" width="30" height="30" rx="2" fill="none" stroke="#C4722A" stroke-width="1" opacity="0.5" />
    <!-- Question mark -->
    <text x="325" y="96" font-family="monospace" font-size="22" font-weight="bold" fill="#C4722A" text-anchor="middle">?</text>
    <!-- Block rivets -->
    <circle cx="310" cy="73" r="2" fill="#C4722A" opacity="0.6" />
    <circle cx="335" cy="73" r="2" fill="#C4722A" opacity="0.6" />
    <circle cx="310" cy="103" r="2" fill="#C4722A" opacity="0.6" />
    <circle cx="335" cy="103" r="2" fill="#C4722A" opacity="0.6" />
  </g>
  <!-- Floating coin above block 2 -->
  <g class="float-coin" transform-origin="325 50" style="animation-delay: 0.5s">
    <g class="coin coin-delay1" transform-origin="325 50">
      <ellipse cx="325" cy="50" rx="10" ry="10" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
      <text x="325" y="55" font-family="monospace" font-size="12" font-weight="bold" fill="#C4722A" text-anchor="middle">in</text>
    </g>
  </g>
  <!-- Label -->
  <text x="325" y="15" class="link-text" fill="#0A66C2" text-anchor="middle">LINKEDIN</text>
  <!-- Sparkle -->
  <text class="sparkle sparkle-d1" x="350" y="60" font-size="8" fill="#E8C547">✦</text>

  <!-- PIPE 2 — Email (right) -->
  <g class="block block-d2">
    <!-- Pipe rim -->
    <rect x="520" y="68" width="60" height="16" rx="3" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="2" />
    <!-- Pipe body -->
    <rect x="526" y="84" width="48" height="36" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="2" />
    <!-- Pipe shine -->
    <rect x="532" y="70" width="8" height="12" fill="#7FDBCA" opacity="0.5" rx="1" />
    <rect x="532" y="86" width="8" height="30" fill="#7FDBCA" opacity="0.3" rx="1" />
  </g>
  <!-- Floating coin above pipe 2 -->
  <g class="float-coin" transform-origin="550 50" style="animation-delay: 1s">
    <g class="coin coin-delay2" transform-origin="550 50">
      <ellipse cx="550" cy="50" rx="10" ry="10" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
      <text x="550" y="55" font-family="monospace" font-size="11" font-weight="bold" fill="#C4722A" text-anchor="middle">@</text>
    </g>
  </g>
  <!-- Label -->
  <text x="550" y="15" class="link-text" fill="#E8A0A0" text-anchor="middle">EMAIL</text>
  <!-- Sparkle -->
  <text class="sparkle sparkle-d2" x="570" y="40" font-size="8" fill="#E8C547">✦</text>

  <!-- Scattered floating coins (decoration) -->
  <g class="float-coin" style="animation-delay: 1.5s">
    <g class="coin" transform-origin="30 45" style="animation-delay: 1.2s">
      <ellipse cx="30" cy="45" rx="6" ry="6" fill="#E8C547" stroke="#C4722A" stroke-width="1" opacity="0.4" />
    </g>
  </g>
  <g class="float-coin" style="animation-delay: 2s">
    <g class="coin" transform-origin="670 55" style="animation-delay: 0.8s">
      <ellipse cx="670" cy="55" rx="6" ry="6" fill="#E8C547" stroke="#C4722A" stroke-width="1" opacity="0.4" />
    </g>
  </g>
  <g class="float-coin" style="animation-delay: 0.7s">
    <g class="coin" transform-origin="220 35" style="animation-delay: 1.5s">
      <ellipse cx="220" cy="35" rx="5" ry="5" fill="#E8C547" stroke="#C4722A" stroke-width="1" opacity="0.3" />
    </g>
  </g>
  <g class="float-coin" style="animation-delay: 1.3s">
    <g class="coin" transform-origin="450 40" style="animation-delay: 0.4s">
      <ellipse cx="450" cy="40" rx="5" ry="5" fill="#E8C547" stroke="#C4722A" stroke-width="1" opacity="0.3" />
    </g>
  </g>

  <!-- Stars in sky -->
  <text class="sparkle" x="180" y="30" font-size="6" fill="#ffffff" opacity="0.3">★</text>
  <text class="sparkle sparkle-d1" x="420" y="25" font-size="5" fill="#ffffff" opacity="0.2">★</text>
  <text class="sparkle sparkle-d2" x="620" y="20" font-size="6" fill="#ffffff" opacity="0.3">★</text>
</svg>
