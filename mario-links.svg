<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 100" width="700" height="100">
  <style>
    @keyframes cs{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.15)}}
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes sp{0%,100%{opacity:0}50%{opacity:1}}
    .fl{animation:fl 3s ease-in-out infinite}.fl1{animation-delay:.4s}.fl2{animation-delay:.8s}
    .cs{animation:cs 2s ease-in-out infinite}.cs1{animation-delay:.5s}.cs2{animation-delay:1s}
    .sp{animation:sp 1.5s ease-in-out infinite}.sp1{animation-delay:.5s}.sp2{animation-delay:1s}
  </style>

  <rect width="700" height="100" fill="#0d1117" rx="0"/>

  <!-- Pipe 1 — Portfolio -->
  <rect x="90" y="28" width="50" height="12" rx="2" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.2"/>
  <rect x="95" y="40" width="40" height="40" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.2"/>
  <rect x="100" y="30" width="5" height="9" fill="#7FDBCA" opacity="0.35" rx="1"/>
  <rect x="100" y="42" width="5" height="35" fill="#7FDBCA" opacity="0.2" rx="1"/>
  <g class="fl"><g class="cs" transform-origin="115 14"><ellipse cx="115" cy="14" rx="7" ry="7" fill="#E8C547" stroke="#C4722A" stroke-width="1"/><text x="115" y="18" font-size="8" fill="#C4722A" text-anchor="middle" font-family="monospace" font-weight="bold">P</text></g></g>
  <text class="sp" x="140" y="20" font-size="6" fill="#E8C547">✦</text>

  <!-- Question Block — LinkedIn -->
  <rect x="310" y="30" width="36" height="36" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5"/>
  <rect x="314" y="34" width="28" height="28" rx="1" fill="none" stroke="#C4722A" stroke-width="0.6" opacity="0.4"/>
  <text x="328" y="56" font-family="monospace" font-size="20" font-weight="bold" fill="#C4722A" text-anchor="middle">?</text>
  <circle cx="316" cy="36" r="1.5" fill="#C4722A" opacity="0.4"/><circle cx="340" cy="36" r="1.5" fill="#C4722A" opacity="0.4"/>
  <circle cx="316" cy="60" r="1.5" fill="#C4722A" opacity="0.4"/><circle cx="340" cy="60" r="1.5" fill="#C4722A" opacity="0.4"/>
  <g class="fl fl1"><g class="cs cs1" transform-origin="328 14"><ellipse cx="328" cy="14" rx="7" ry="7" fill="#E8C547" stroke="#C4722A" stroke-width="1"/><text x="328" y="18" font-size="7" fill="#C4722A" text-anchor="middle" font-family="monospace" font-weight="bold">in</text></g></g>
  <text class="sp sp1" x="352" y="25" font-size="6" fill="#E8C547">✦</text>

  <!-- Pipe 2 — Email -->
  <rect x="520" y="28" width="50" height="12" rx="2" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.2"/>
  <rect x="525" y="40" width="40" height="40" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.2"/>
  <rect x="530" y="30" width="5" height="9" fill="#7FDBCA" opacity="0.35" rx="1"/>
  <rect x="530" y="42" width="5" height="35" fill="#7FDBCA" opacity="0.2" rx="1"/>
  <g class="fl fl2"><g class="cs cs2" transform-origin="545 14"><ellipse cx="545" cy="14" rx="7" ry="7" fill="#E8C547" stroke="#C4722A" stroke-width="1"/><text x="545" y="18" font-size="8" fill="#C4722A" text-anchor="middle" font-family="monospace" font-weight="bold">@</text></g></g>
  <text class="sp sp2" x="570" y="20" font-size="6" fill="#E8C547">✦</text>

  <!-- Ground — the one and only ground strip on the whole profile -->
  <g fill="#8B4513" opacity="0.8">
    <rect x="0" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="20" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="40" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="60" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
