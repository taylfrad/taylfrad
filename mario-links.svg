<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 700 125" width="700" height="125">
  <defs>
    <radialGradient id="ag" cx="50%" cy="30%" r="60%"><stop offset="0%" stop-color="#8B5CF6" stop-opacity=".04"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/></radialGradient>

    <symbol id="pipe" viewBox="0 0 44 70">
      <rect x="0" y="0" width="44" height="12" fill="#000" rx="1"/>
      <rect x="1" y="1" width="42" height="10" fill="#00A800"/>
      <rect x="2" y="1" width="6" height="10" fill="#008800"/>
      <rect x="8" y="1" width="6" height="10" fill="#00A800"/>
      <rect x="14" y="1" width="4" height="10" fill="#30C830"/>
      <rect x="18" y="1" width="4" height="10" fill="#58E858"/>
      <rect x="22" y="1" width="6" height="10" fill="#30C830"/>
      <rect x="28" y="1" width="6" height="10" fill="#00A800"/>
      <rect x="34" y="1" width="4" height="10" fill="#008800"/>
      <rect x="38" y="1" width="4" height="10" fill="#006000"/>
      <rect x="4" y="12" width="36" height="58" fill="#000"/>
      <rect x="5" y="12" width="34" height="58" fill="#00A800"/>
      <rect x="6" y="12" width="4" height="58" fill="#008800"/>
      <rect x="10" y="12" width="5" height="58" fill="#00A800"/>
      <rect x="15" y="12" width="4" height="58" fill="#30C830"/>
      <rect x="19" y="12" width="3" height="58" fill="#58E858"/>
      <rect x="22" y="12" width="5" height="58" fill="#30C830"/>
      <rect x="27" y="12" width="5" height="58" fill="#00A800"/>
      <rect x="32" y="12" width="4" height="58" fill="#008800"/>
      <rect x="36" y="12" width="3" height="58" fill="#006000"/>
    </symbol>

    <symbol id="qb" viewBox="0 0 36 36">
      <rect width="36" height="36" fill="#000" rx="2"/>
      <rect x="1" y="1" width="34" height="34" fill="#F0C800" rx="1"/>
      <rect x="2" y="2" width="32" height="32" fill="#E8B800" rx="1"/>
      <rect x="1" y="1" width="34" height="2" fill="#F8E060"/>
      <rect x="1" y="1" width="2" height="34" fill="#F8E060"/>
      <rect x="12" y="8" width="12" height="3" fill="#fff"/>
      <rect x="21" y="8" width="3" height="10" fill="#fff"/>
      <rect x="14" y="16" width="10" height="3" fill="#fff"/>
      <rect x="14" y="16" width="3" height="7" fill="#fff"/>
      <rect x="14" y="26" width="3" height="3" fill="#fff"/>
      <circle cx="6" cy="6" r="2.5" fill="#A08000"/><circle cx="30" cy="6" r="2.5" fill="#A08000"/>
      <circle cx="6" cy="30" r="2.5" fill="#A08000"/><circle cx="30" cy="30" r="2.5" fill="#A08000"/>
    </symbol>

    <symbol id="coin" viewBox="0 0 12 14">
      <rect x="4" y="0" width="4" height="2" fill="#000"/>
      <rect x="2" y="2" width="2" height="2" fill="#000"/><rect x="8" y="2" width="2" height="2" fill="#000"/>
      <rect x="0" y="4" width="2" height="6" fill="#000"/><rect x="10" y="4" width="2" height="6" fill="#000"/>
      <rect x="2" y="10" width="2" height="2" fill="#000"/><rect x="8" y="10" width="2" height="2" fill="#000"/>
      <rect x="4" y="12" width="4" height="2" fill="#000"/>
      <rect x="4" y="2" width="4" height="10" fill="#E8A800"/>
      <rect x="2" y="4" width="8" height="6" fill="#E8A800"/>
      <rect x="2" y="4" width="2" height="6" fill="#fff"/>
      <rect x="4" y="2" width="2" height="2" fill="#fff"/>
      <rect x="4" y="4" width="2" height="6" fill="#F8D830"/>
    </symbol>
  </defs>
  <style>
    @keyframes cs{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.15)}}
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes sp{0%,100%{opacity:0}50%{opacity:1}}
    @keyframes bm{0%,88%,100%{transform:translateY(0)}92%{transform:translateY(-5px)}96%{transform:translateY(-1px)}}
    .fl{animation:fl 3s ease-in-out infinite}.fl1{animation-delay:.4s}.fl2{animation-delay:.8s}
    .cs{animation:cs 2s ease-in-out infinite}.cs1{animation-delay:.5s}.cs2{animation-delay:1s}
    .sp{animation:sp 1.5s ease-in-out infinite}.sp1{animation-delay:.5s}.sp2{animation-delay:1s}
    .bm{animation:bm 5s ease-in-out infinite 1s}
  </style>
  <rect x="0" y="-15" width="700" height="125" fill="#050c21"/>
  <rect x="0" y="-15" width="700" height="125" fill="url(#ag)"/>

  <!-- PIPE 1 — Portfolio -->
  <use href="#pipe" x="88" y="20" width="44" height="60"/>
  <g class="fl"><g class="cs" transform-origin="110 8"><use href="#coin" x="104" y="1" width="12" height="14"/></g></g>

  <!-- QUESTION BLOCK — LinkedIn -->
  <g class="bm" transform-origin="328 40">
    <use href="#qb" x="310" y="22" width="36" height="36"/>
  </g>
  <g class="fl fl1"><g class="cs cs1" transform-origin="328 8"><use href="#coin" x="322" y="1" width="12" height="14"/></g></g>

  <!-- PIPE 2 — Email -->
  <use href="#pipe" x="528" y="20" width="44" height="60"/>
  <g class="fl fl2"><g class="cs cs2" transform-origin="550 8"><use href="#coin" x="544" y="1" width="12" height="14"/></g></g>

  <!-- ===== PIXEL GROUND BLOCK — matching reference ===== -->
  <!-- Black top edge -->
  <rect x="0" y="72" width="700" height="2" fill="#000"/>
  <!-- Bright green grass -->
  <rect x="0" y="74" width="700" height="6" fill="#00E800"/>
  <!-- Pixel grass underside — alternating green/dark/black blocks -->
  <rect x="0" y="80" width="700" height="4" fill="#000"/>
  <rect x="0" y="80" width="40" height="4" fill="#008800"/><rect x="50" y="80" width="60" height="4" fill="#00C800"/>
  <rect x="120" y="80" width="40" height="4" fill="#008800"/><rect x="170" y="80" width="50" height="4" fill="#00C800"/>
  <rect x="230" y="80" width="30" height="4" fill="#006800"/><rect x="280" y="80" width="50" height="4" fill="#008800"/>
  <rect x="340" y="80" width="40" height="4" fill="#00C800"/><rect x="390" y="80" width="30" height="4" fill="#006800"/>
  <rect x="440" y="80" width="50" height="4" fill="#008800"/><rect x="500" y="80" width="40" height="4" fill="#00C800"/>
  <rect x="550" y="80" width="30" height="4" fill="#006800"/><rect x="600" y="80" width="50" height="4" fill="#008800"/>
  <rect x="660" y="80" width="40" height="4" fill="#00C800"/>
  <!-- Darker green transition -->
  <rect x="0" y="84" width="700" height="3" fill="#000"/>
  <rect x="10" y="84" width="50" height="3" fill="#006800"/><rect x="80" y="84" width="30" height="3" fill="#006800"/>
  <rect x="140" y="84" width="60" height="3" fill="#006800"/><rect x="240" y="84" width="40" height="3" fill="#006800"/>
  <rect x="320" y="84" width="50" height="3" fill="#006800"/><rect x="410" y="84" width="30" height="3" fill="#006800"/>
  <rect x="480" y="84" width="60" height="3" fill="#006800"/><rect x="580" y="84" width="40" height="3" fill="#006800"/>
  <rect x="650" y="84" width="50" height="3" fill="#006800"/>
  <!-- Dark olive/brown transition -->
  <rect x="0" y="87" width="700" height="3" fill="#806830"/>
  <rect x="30" y="87" width="40" height="3" fill="#604820"/><rect x="150" y="87" width="50" height="3" fill="#604820"/>
  <rect x="300" y="87" width="30" height="3" fill="#604820"/><rect x="450" y="87" width="40" height="3" fill="#604820"/>
  <rect x="580" y="87" width="50" height="3" fill="#604820"/>
  <!-- Main dirt body -->
  <rect x="0" y="90" width="700" height="20" fill="#C8A868"/>
  <!-- Dirt spots — scattered yellow/olive -->
  <rect x="60" y="94" width="8" height="6" fill="#D0C060" opacity=".6"/>
  <rect x="200" y="96" width="5" height="4" fill="#D0C060" opacity=".5"/>
  <rect x="350" y="93" width="7" height="5" fill="#A0A040" opacity=".5"/>
  <rect x="480" y="97" width="6" height="4" fill="#D0C060" opacity=".6"/>
  <rect x="600" y="94" width="9" height="6" fill="#A0A040" opacity=".5"/>
  <rect x="140" y="100" width="4" height="3" fill="#D0C060" opacity=".4"/>
  <rect x="420" y="99" width="5" height="4" fill="#A0A040" opacity=".4"/>
  <rect x="650" y="100" width="6" height="4" fill="#D0C060" opacity=".5"/>
</svg>
