    <rect x="100" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="120" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="140" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="160" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="180" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="200" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="220" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="240" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="260" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="280" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="300" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="320" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="340" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="360" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="380" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="400" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="420" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="440" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="460" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="480" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="500" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="520" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="540" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="560" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="580" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="600" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="620" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="640" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="660" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
    <rect x="680" y="80" width="20" height="20" stroke="#6B3410" stroke-width="0.6"/>
  </g>
