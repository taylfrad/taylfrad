<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <style>
    @keyframes block-bump { 0%,85%,100% { transform: translateY(0); } 90% { transform: translateY(-6px); } 95% { transform: translateY(-2px); } }
    @keyframes coin-spin { 0%,100% { transform: scaleX(1); } 25% { transform: scaleX(0.15); } 50% { transform: scaleX(1); } 75% { transform: scaleX(0.15); } }
    @keyframes coin-float { 0%,100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-5px); opacity: 0.7; } }
    @keyframes sparkle { 0%,100% { opacity: 0; } 50% { opacity: 1; } }

    .b0 { animation: block-bump 5s ease-in-out infinite 0s; }
    .b1 { animation: block-bump 5s ease-in-out infinite 0.8s; }
    .b2 { animation: block-bump 5s ease-in-out infinite 1.6s; }
    .b3 { animation: block-bump 5s ease-in-out infinite 2.4s; }
    .b4 { animation: block-bump 5s ease-in-out infinite 3.2s; }
    .b5 { animation: block-bump 5s ease-in-out infinite 4.0s; }
    .cf { animation: coin-float 3s ease-in-out infinite; }
    .cf1 { animation-delay: 0.3s; }
    .cf2 { animation-delay: 0.6s; }
    .cf3 { animation-delay: 0.9s; }
    .cf4 { animation-delay: 1.2s; }
    .cs { animation: coin-spin 2s ease-in-out infinite; }
    .cs1 { animation-delay: 0.4s; }
    .cs2 { animation-delay: 0.8s; }
    .cs3 { animation-delay: 1.2s; }
    .cs4 { animation-delay: 1.6s; }
    .sp { animation: sparkle 1.8s ease-in-out infinite; }
    .sp1 { animation-delay: 0.6s; }
    .sp2 { animation-delay: 1.2s; }
  </style>

  <!-- Background -->
  <rect width="800" height="120" fill="#0d1117" rx="8" />

  <!-- Ground -->
  <g fill="#8B4513" opacity="0.7">
    <rect x="0" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="20" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="40" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="60" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="80" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="100" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="120" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="140" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="160" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="180" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="200" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="220" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="240" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="260" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="280" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="300" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="320" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="340" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="360" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="380" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="400" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="420" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="440" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="460" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="480" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="500" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="520" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="540" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="560" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="580" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="600" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="620" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="640" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="660" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="680" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="700" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="720" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="740" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="760" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
    <rect x="780" y="100" width="20" height="20" stroke="#6B3410" stroke-width="0.6" />
  </g>

  <!-- ============ TECH BLOCKS ============ -->

  <!-- React block -->
  <g class="b0" transform-origin="75 70">
    <rect x="45" y="60" width="60" height="34" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
    <text x="75" y="82" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#61DAFB" text-anchor="middle">React</text>
    <circle cx="51" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="99" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="51" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="99" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
  </g>
  <text x="75" y="54" font-family="'Courier New', monospace" font-size="7" fill="#4a6a72" text-anchor="middle">+ Native</text>

  <!-- Coin between -->
  <g class="cf" transform-origin="135 70">
    <g class="cs" transform-origin="135 70">
      <ellipse cx="135" cy="70" rx="6" ry="6" fill="#E8C547" stroke="#C4722A" stroke-width="1" />
    </g>
  </g>

  <!-- Next.js block -->
  <g class="b1" transform-origin="195 70">
    <rect x="160" y="60" width="70" height="34" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
    <text x="195" y="82" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Next.js</text>
    <circle cx="166" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="224" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="166" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="224" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
  </g>
  <text x="195" y="54" font-family="'Courier New', monospace" font-size="7" fill="#4a6a72" text-anchor="middle">14</text>

  <!-- Coin between -->
  <g class="cf cf1" transform-origin="260 70">
    <g class="cs cs1" transform-origin="260 70">
      <ellipse cx="260" cy="70" rx="6" ry="6" fill="#E8C547" stroke="#C4722A" stroke-width="1" />
    </g>
  </g>

  <!-- TypeScript block -->
  <g class="b2" transform-origin="335 70">
    <rect x="290" y="60" width="90" height="34" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
    <text x="335" y="82" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#3178C6" text-anchor="middle">TypeScript</text>
    <circle cx="296" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="374" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="296" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="374" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
  </g>

  <!-- Coin between -->
  <g class="cf cf2" transform-origin="410 70">
    <g class="cs cs2" transform-origin="410 70">
      <ellipse cx="410" cy="70" rx="6" ry="6" fill="#E8C547" stroke="#C4722A" stroke-width="1" />
    </g>
  </g>

  <!-- Tailwind block -->
  <g class="b3" transform-origin="480 70">
    <rect x="440" y="60" width="80" height="34" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
    <text x="480" y="82" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#06B6D4" text-anchor="middle">Tailwind</text>
    <circle cx="446" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="514" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="446" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="514" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
  </g>

  <!-- Coin between -->
  <g class="cf cf3" transform-origin="550 70">
    <g class="cs cs3" transform-origin="550 70">
      <ellipse cx="550" cy="70" rx="6" ry="6" fill="#E8C547" stroke="#C4722A" stroke-width="1" />
    </g>
  </g>

  <!-- Three.js block -->
  <g class="b4" transform-origin="615 70">
    <rect x="580" y="60" width="70" height="34" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
    <text x="615" y="82" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Three.js</text>
    <circle cx="586" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="644" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="586" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="644" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
