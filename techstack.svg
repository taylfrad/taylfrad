    </g>
  </g>

  <!-- Azure block -->
  <g class="b5" transform-origin="740 70">
    <rect x="710" y="60" width="60" height="34" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
    <text x="740" y="82" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#0078D4" text-anchor="middle">Azure</text>
    <circle cx="716" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="764" cy="66" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="716" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
    <circle cx="764" cy="88" r="1.5" fill="#C4722A" opacity="0.4" />
  </g>

  <!-- Sparkles -->
  <text class="sp" x="110" y="55" font-size="6" fill="#E8C547">✦</text>
  <text class="sp sp1" x="385" y="52" font-size="6" fill="#E8C547">✦</text>
  <text class="sp sp2" x="660" y="55" font-size="6" fill="#E8C547">✦</text>

  <!-- Small stars -->
  <circle cx="20" cy="15" r="1" fill="#ffffff" opacity="0.2" />
  <circle cx="400" cy="10" r="1" fill="#ffffff" opacity="0.15" />
  <circle cx="780" cy="18" r="1" fill="#ffffff" opacity="0.2" />
</svg>
