<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 55" width="800" height="55">
  <style>
    @keyframes bump { 0%,85%,100% { transform: translateY(0); } 90% { transform: translateY(-4px); } 95% { transform: translateY(-1px); } }
    @keyframes cs { 0%,100% { transform: scaleX(1); } 50% { transform: scaleX(0.15); } }
    .b0{animation:bump 4.5s ease-in-out infinite 0s}.b1{animation:bump 4.5s ease-in-out infinite .7s}.b2{animation:bump 4.5s ease-in-out infinite 1.4s}.b3{animation:bump 4.5s ease-in-out infinite 2.1s}.b4{animation:bump 4.5s ease-in-out infinite 2.8s}.b5{animation:bump 4.5s ease-in-out infinite 3.5s}
    .c0{animation:cs 2s ease-in-out infinite .2s}.c1{animation:cs 2s ease-in-out infinite .6s}.c2{animation:cs 2s ease-in-out infinite 1s}.c3{animation:cs 2s ease-in-out infinite 1.4s}.c4{animation:cs 2s ease-in-out infinite 1.8s}
  </style>
  <rect width="800" height="55" fill="#0d1117"/>

  <!-- React -->
  <g class="b0" transform-origin="67 28">
    <rect x="30" y="14" width="74" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.2"/>
    <text x="67" y="33" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#61DAFB" text-anchor="middle">React</text>
    <circle cx="35" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/><circle cx="99" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/>
  </g>

  <g class="c0" transform-origin="120 28"><ellipse cx="120" cy="28" rx="5" ry="5" fill="#E8C547" stroke="#C4722A" stroke-width="0.8"/></g>

  <!-- Next.js -->
  <g class="b1" transform-origin="172 28">
    <rect x="135" y="14" width="74" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.2"/>
    <text x="172" y="33" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Next.js</text>
    <circle cx="140" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/><circle cx="204" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/>
  </g>

  <g class="c1" transform-origin="225 28"><ellipse cx="225" cy="28" rx="5" ry="5" fill="#E8C547" stroke="#C4722A" stroke-width="0.8"/></g>

  <!-- TypeScript -->
  <g class="b2" transform-origin="295 28">
    <rect x="248" y="14" width="94" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.2"/>
    <text x="295" y="33" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#3178C6" text-anchor="middle">TypeScript</text>
    <circle cx="253" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/><circle cx="337" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/>
  </g>

  <g class="c2" transform-origin="360 28"><ellipse cx="360" cy="28" rx="5" ry="5" fill="#E8C547" stroke="#C4722A" stroke-width="0.8"/></g>

  <!-- Tailwind -->
  <g class="b3" transform-origin="425 28">
    <rect x="383" y="14" width="84" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.2"/>
    <text x="425" y="33" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#06B6D4" text-anchor="middle">Tailwind</text>
    <circle cx="388" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/><circle cx="462" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/>
  </g>

  <g class="c3" transform-origin="484 28"><ellipse cx="484" cy="28" rx="5" ry="5" fill="#E8C547" stroke="#C4722A" stroke-width="0.8"/></g>

  <!-- Three.js -->
  <g class="b4" transform-origin="548 28">
    <rect x="506" y="14" width="84" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.2"/>
    <text x="548" y="33" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Three.js</text>
    <circle cx="511" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/><circle cx="585" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/>
  </g>

  <g class="c4" transform-origin="607 28"><ellipse cx="607" cy="28" rx="5" ry="5" fill="#E8C547" stroke="#C4722A" stroke-width="0.8"/></g>

  <!-- Azure -->
  <g class="b5" transform-origin="672 28">
    <rect x="635" y="14" width="74" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.2"/>
    <text x="672" y="33" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#0078D4" text-anchor="middle">Azure</text>
    <circle cx="640" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/><circle cx="704" cy="19" r="1.2" fill="#C4722A" opacity="0.35"/>
  </g>
</svg>
