<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="800" height="80">
  <defs>
    <!-- GOOMBA with walk frames -->
    <symbol id="goomba-a" viewBox="0 0 14 16">
      <rect x="4" y="0" width="6" height="2" fill="#A07050"/>
      <rect x="2" y="2" width="10" height="2" fill="#B08060"/>
      <rect x="1" y="4" width="12" height="2" fill="#A07050"/>
      <rect x="1" y="4" width="2" height="1" fill="#000"/><rect x="2" y="5" width="2" height="1" fill="#000"/><rect x="3" y="4" width="1" height="1" fill="#000"/>
      <rect x="11" y="4" width="2" height="1" fill="#000"/><rect x="9" y="5" width="2" height="1" fill="#000"/><rect x="10" y="4" width="1" height="1" fill="#000"/>
      <rect x="2" y="6" width="3" height="2" fill="#fff"/><rect x="9" y="6" width="3" height="2" fill="#fff"/>
      <rect x="4" y="6" width="1" height="2" fill="#000"/><rect x="9" y="6" width="1" height="2" fill="#000"/>
      <rect x="1" y="8" width="12" height="3" fill="#F0D0B0"/>
      <rect x="1" y="8" width="1" height="3" fill="#A07050"/><rect x="12" y="8" width="1" height="3" fill="#A07050"/>
      <rect x="4" y="8" width="2" height="2" fill="#fff"/><rect x="8" y="8" width="2" height="2" fill="#fff"/>
      <rect x="6" y="9" width="2" height="1" fill="#604020"/>
      <rect x="3" y="11" width="8" height="2" fill="#604020"/>
      <!-- Walk frame A — feet apart -->
      <rect x="0" y="13" width="4" height="3" fill="#000"/><rect x="1" y="13" width="3" height="2" fill="#604020"/>
      <rect x="10" y="13" width="4" height="3" fill="#000"/><rect x="10" y="13" width="3" height="2" fill="#604020"/>
    </symbol>
  </defs>
  <style>
    /* Run across screen */
    @keyframes mario-run{0%{transform:translateX(-80px)}100%{transform:translateX(830px)}}
    @keyframes luigi-run{0%{transform:translateX(-80px)}100%{transform:translateX(830px)}}

    /* Snappy Mario jump — fast rise, float at peak, fast drop */
    /* Jumps at ~31%, ~56%, ~79% */
    @keyframes mario-jump{
      0%,27%{transform:translateY(0)}
      28%{transform:translateY(-10px)}
      29%{transform:translateY(-26px)}
      30%{transform:translateY(-30px)}
      31%{transform:translateY(-30px)}
      32%{transform:translateY(-28px)}
      33%{transform:translateY(-10px)}
      34%{transform:translateY(0)}
      35%,52%{transform:translateY(0)}
      53%{transform:translateY(-10px)}
      54%{transform:translateY(-26px)}
      55%{transform:translateY(-30px)}
      56%{transform:translateY(-30px)}
      57%{transform:translateY(-28px)}
      58%{transform:translateY(-10px)}
      59%{transform:translateY(0)}
      60%,76%{transform:translateY(0)}
      77%{transform:translateY(-10px)}
      78%{transform:translateY(-26px)}
      79%{transform:translateY(-30px)}
      80%{transform:translateY(-30px)}
      81%{transform:translateY(-28px)}
      82%{transform:translateY(-10px)}
      83%{transform:translateY(0)}
      84%,100%{transform:translateY(0)}
    }
    /* Luigi jumps at ~35%, ~60%, ~84% */
    @keyframes luigi-jump{
      0%,31%{transform:translateY(0)}
      32%{transform:translateY(-10px)}
      33%{transform:translateY(-26px)}
      34%{transform:translateY(-32px)}
      35%{transform:translateY(-32px)}
      36%{transform:translateY(-28px)}
      37%{transform:translateY(-10px)}
      38%{transform:translateY(0)}
      39%,56%{transform:translateY(0)}
      57%{transform:translateY(-10px)}
      58%{transform:translateY(-26px)}
      59%{transform:translateY(-32px)}
      60%{transform:translateY(-32px)}
      61%{transform:translateY(-28px)}
      62%{transform:translateY(-10px)}
      63%{transform:translateY(0)}
      64%,80%{transform:translateY(0)}
      81%{transform:translateY(-10px)}
      82%{transform:translateY(-26px)}
      83%{transform:translateY(-32px)}
      84%{transform:translateY(-32px)}
      85%{transform:translateY(-28px)}
      86%{transform:translateY(-10px)}
      87%{transform:translateY(0)}
      88%,100%{transform:translateY(0)}
    }

    /* Show running sprite when grounded, jump sprite when airborne */
    @keyframes mario-run-show{
      0%,27%{opacity:1}28%,34%{opacity:0}35%,52%{opacity:1}53%,59%{opacity:0}60%,76%{opacity:1}77%,83%{opacity:0}84%,100%{opacity:1}
    }
    @keyframes mario-jump-show{
      0%,27%{opacity:0}28%,34%{opacity:1}35%,52%{opacity:0}53%,59%{opacity:1}60%,76%{opacity:0}77%,83%{opacity:1}84%,100%{opacity:0}
    }
    @keyframes luigi-run-show{
      0%,31%{opacity:1}32%,38%{opacity:0}39%,56%{opacity:1}57%,63%{opacity:0}64%,80%{opacity:1}81%,87%{opacity:0}88%,100%{opacity:1}
    }
    @keyframes luigi-jump-show{
      0%,31%{opacity:0}32%,38%{opacity:1}39%,56%{opacity:0}57%,63%{opacity:1}64%,80%{opacity:0}81%,87%{opacity:1}88%,100%{opacity:0}
    }

    /* Leg run cycle */
    @keyframes legA{0%,40%{opacity:1}41%,80%{opacity:0}81%,100%{opacity:1}}
    @keyframes legB{0%,40%{opacity:0}41%,80%{opacity:1}81%,100%{opacity:0}}

    /* Goomba shuffle — just walk left and right on the ground */
    @keyframes goomba-walk{
      0%,100%{transform:translateX(0)}
      50%{transform:translateX(-20px)}
    }

    .mw{animation:mario-run 10s linear infinite}
    .lw{animation:luigi-run 10s linear infinite 2s}
    .mj{animation:mario-jump 10s linear infinite}
    .lj{animation:mario-jump 10s linear infinite 2s}
    .mrs{animation:mario-run-show 10s step-end infinite}
    .mjs{animation:mario-jump-show 10s step-end infinite}
    .lrs{animation:mario-run-show 10s step-end infinite 2s}
    .ljs{animation:mario-jump-show 10s step-end infinite 2s}
    .la{animation:legA .15s step-end infinite}
    .lb{animation:legB .15s step-end infinite}
    .gw{animation:goomba-walk 3s ease-in-out infinite}
  </style>
  <rect width="800" height="80" fill="#0d1117"/>

  <!-- GROUND -->
  <rect x="0" y="60" width="800" height="2" fill="#000"/>
  <rect x="0" y="62" width="800" height="5" fill="#00E800"/>
  <rect x="0" y="62" width="800" height="2" fill="#40F840"/>
  <rect x="15" y="60" width="6" height="4" fill="#00E800"/><rect x="55" y="59" width="8" height="5" fill="#00C800"/>
  <rect x="120" y="60" width="5" height="4" fill="#00E800"/><rect x="185" y="59" width="7" height="5" fill="#00C800"/>
  <rect x="250" y="60" width="6" height="4" fill="#00E800"/><rect x="320" y="59" width="8" height="5" fill="#00C800"/>
  <rect x="390" y="60" width="5" height="4" fill="#00E800"/><rect x="460" y="59" width="7" height="5" fill="#00C800"/>
  <rect x="530" y="60" width="6" height="4" fill="#00E800"/><rect x="600" y="59" width="8" height="5" fill="#00C800"/>
  <rect x="670" y="60" width="5" height="4" fill="#00E800"/><rect x="740" y="59" width="7" height="5" fill="#00C800"/>
  <!-- Transition -->
  <rect x="0" y="67" width="800" height="3" fill="#000"/>
  <rect x="0" y="67" width="30" height="3" fill="#008800"/><rect x="40" y="67" width="50" height="3" fill="#006800"/>
  <rect x="100" y="67" width="35" height="3" fill="#008800"/><rect x="150" y="67" width="45" height="3" fill="#006800"/>
  <rect x="210" y="67" width="30" height="3" fill="#008800"/><rect x="260" y="67" width="50" height="3" fill="#006800"/>
  <rect x="330" y="67" width="35" height="3" fill="#008800"/><rect x="380" y="67" width="40" height="3" fill="#006800"/>
  <rect x="440" y="67" width="30" height="3" fill="#008800"/><rect x="490" y="67" width="50" height="3" fill="#006800"/>
  <rect x="560" y="67" width="35" height="3" fill="#008800"/><rect x="610" y="67" width="40" height="3" fill="#006800"/>
  <rect x="670" y="67" width="30" height="3" fill="#008800"/><rect x="720" y="67" width="50" height="3" fill="#006800"/>
  <!-- Dirt -->
  <rect x="0" y="70" width="800" height="2" fill="#806830"/>
  <rect x="0" y="72" width="800" height="8" fill="#C8A868"/>
  <rect x="70" y="74" width="6" height="3" fill="#D0C060" opacity=".5"/>
  <rect x="350" y="75" width="5" height="3" fill="#A0A040" opacity=".4"/>
  <rect x="600" y="74" width="7" height="3" fill="#D0C060" opacity=".5"/>

  <!-- GOOMBAS — shuffling left and right on the ground -->
  <g class="gw"><use href="#goomba-a" x="200" y="32" width="22" height="28"/></g>
  <g class="gw" style="animation-delay:1s"><use href="#goomba-a" x="430" y="32" width="22" height="28"/></g>
  <g class="gw" style="animation-delay:2s"><use href="#goomba-a" x="640" y="32" width="22" height="28"/></g>

  <!-- ========== MARIO ========== -->
  <g class="mw">
    <g class="mj">
      <!-- RUNNING SPRITE — visible when grounded -->
      <g class="mrs">
        <!-- Hat -->
        <rect x="5" y="28" width="14" height="4" fill="#E02020" rx="1"/>
        <rect x="3" y="32" width="18" height="3" fill="#E02020"/>
        <!-- Hair -->
        <rect x="3" y="35" width="4" height="3" fill="#804020"/>
        <!-- Face — golden skin, black eye + mustache -->
        <rect x="7" y="35" width="10" height="2" fill="#E8A030"/>
        <rect x="17" y="35" width="3" height="2" fill="#E8A030"/>
        <rect x="14" y="35" width="2" height="2" fill="#000"/><!-- eye -->
        <rect x="3" y="37" width="3" height="2" fill="#E8A030"/>
        <rect x="6" y="37" width="8" height="2" fill="#E8A030"/>
        <rect x="14" y="37" width="6" height="2" fill="#000"/><!-- mustache -->
        <rect x="18" y="37" width="3" height="2" fill="#E8A030"/><!-- nose -->
        <!-- Shirt + arms (skin hands) -->
        <rect x="3" y="40" width="16" height="4" fill="#E02020"/>
        <rect x="0" y="41" width="3" height="4" fill="#E8A030"/>
        <rect x="19" y="41" width="3" height="4" fill="#E8A030"/>
        <!-- Overalls -->
        <rect x="4" y="44" width="14" height="4" fill="#0058F8"/>
        <rect x="7" y="44" width="2" height="2" fill="#E8C800"/>
        <rect x="13" y="44" width="2" height="2" fill="#E8C800"/>
        <!-- Leg A -->
        <g class="la">
          <rect x="2" y="48" width="6" height="6" fill="#0058F8"/>
          <rect x="14" y="48" width="6" height="4" fill="#0058F8"/>
          <rect x="0" y="54" width="7" height="4" fill="#804020" rx="1"/>
          <rect x="15" y="52" width="6" height="4" fill="#804020" rx="1"/>
        </g>
        <!-- Leg B -->
        <g class="lb">
          <rect x="4" y="48" width="6" height="4" fill="#0058F8"/>
          <rect x="12" y="48" width="6" height="6" fill="#0058F8"/>
          <rect x="3" y="52" width="6" height="4" fill="#804020" rx="1"/>
          <rect x="13" y="54" width="7" height="4" fill="#804020" rx="1"/>
        </g>
      </g>

      <!-- JUMP SPRITE — visible when airborne -->
      <g class="mjs">
        <!-- Hat -->
        <rect x="5" y="28" width="14" height="4" fill="#E02020" rx="1"/>
        <rect x="3" y="32" width="18" height="3" fill="#E02020"/>
        <!-- Hair -->
        <rect x="3" y="35" width="4" height="3" fill="#804020"/>
        <!-- Face — golden skin, mustache -->
        <rect x="7" y="35" width="10" height="2" fill="#E8A030"/>
        <rect x="17" y="35" width="3" height="2" fill="#E8A030"/>
        <rect x="14" y="35" width="2" height="2" fill="#000"/>
        <rect x="3" y="37" width="3" height="2" fill="#E8A030"/>
        <rect x="6" y="37" width="8" height="2" fill="#E8A030"/>
        <rect x="14" y="37" width="6" height="2" fill="#000"/>
        <rect x="18" y="37" width="3" height="2" fill="#E8A030"/>
        <!-- Shirt — arm reaching up -->
        <rect x="3" y="40" width="16" height="4" fill="#E02020"/>
        <rect x="19" y="38" width="3" height="3" fill="#E8A030"/><!-- right arm UP -->
        <rect x="0" y="41" width="3" height="4" fill="#E8A030"/>
        <!-- Overalls -->
        <rect x="4" y="44" width="14" height="3" fill="#0058F8"/>
        <rect x="7" y="44" width="2" height="2" fill="#E8C800"/>
        <rect x="13" y="44" width="2" height="2" fill="#E8C800"/>
        <!-- Legs TUCKED — bent up underneath -->
        <rect x="4" y="47" width="5" height="4" fill="#0058F8"/>
        <rect x="11" y="47" width="5" height="4" fill="#0058F8"/>
        <rect x="3" y="51" width="5" height="3" fill="#804020" rx="1"/>
        <rect x="12" y="51" width="5" height="3" fill="#804020" rx="1"/>
      </g>
    </g>
  </g>

  <!-- ========== LUIGI ========== -->
  <g class="lw">
    <g class="lj">
      <!-- RUNNING SPRITE -->
      <g class="lrs">
        <rect x="5" y="24" width="14" height="4" fill="#20A020" rx="1"/>
        <rect x="3" y="28" width="18" height="3" fill="#20A020"/>
        <rect x="3" y="31" width="4" height="3" fill="#804020"/>
        <!-- Face — peach skin, eye + mustache -->
        <rect x="7" y="31" width="10" height="2" fill="#F0B070"/>
        <rect x="17" y="31" width="3" height="2" fill="#F0B070"/>
        <rect x="14" y="31" width="2" height="2" fill="#000"/>
        <rect x="3" y="33" width="3" height="2" fill="#F0B070"/>
        <rect x="6" y="33" width="8" height="2" fill="#F0B070"/>
        <rect x="14" y="33" width="6" height="2" fill="#000"/>
        <rect x="18" y="33" width="3" height="2" fill="#F0B070"/>
        <!-- Shirt + white gloves -->
        <rect x="3" y="36" width="16" height="4" fill="#20A020"/>
        <rect x="0" y="37" width="3" height="4" fill="#fff"/>
        <rect x="19" y="37" width="3" height="4" fill="#fff"/>
        <rect x="4" y="40" width="14" height="4" fill="#0058F8"/>
        <rect x="7" y="40" width="2" height="2" fill="#E8C800"/>
        <rect x="13" y="40" width="2" height="2" fill="#E8C800"/>
        <g class="la" style="animation-delay:.07s">
          <rect x="2" y="44" width="6" height="8" fill="#0058F8"/>
          <rect x="14" y="44" width="6" height="6" fill="#0058F8"/>
          <rect x="0" y="52" width="7" height="4" fill="#804020" rx="1"/>
          <rect x="15" y="50" width="6" height="4" fill="#804020" rx="1"/>
        </g>
        <g class="lb" style="animation-delay:.07s">
          <rect x="4" y="44" width="6" height="6" fill="#0058F8"/>
          <rect x="12" y="44" width="6" height="8" fill="#0058F8"/>
          <rect x="3" y="50" width="6" height="4" fill="#804020" rx="1"/>
          <rect x="13" y="52" width="7" height="4" fill="#804020" rx="1"/>
        </g>
      </g>

      <!-- JUMP SPRITE -->
      <g class="ljs">
        <rect x="5" y="24" width="14" height="4" fill="#20A020" rx="1"/>
        <rect x="3" y="28" width="18" height="3" fill="#20A020"/>
        <rect x="3" y="31" width="4" height="3" fill="#804020"/>
        <!-- Face — peach skin, mustache -->
        <rect x="7" y="31" width="10" height="2" fill="#F0B070"/>
        <rect x="17" y="31" width="3" height="2" fill="#F0B070"/>
        <rect x="14" y="31" width="2" height="2" fill="#000"/>
        <rect x="3" y="33" width="3" height="2" fill="#F0B070"/>
        <rect x="6" y="33" width="8" height="2" fill="#F0B070"/>
        <rect x="14" y="33" width="6" height="2" fill="#000"/>
        <rect x="18" y="33" width="3" height="2" fill="#F0B070"/>
        <!-- Shirt + white gloves -->
        <rect x="3" y="36" width="16" height="4" fill="#20A020"/>
        <rect x="19" y="34" width="3" height="3" fill="#fff"/><!-- arm UP -->
        <rect x="0" y="37" width="3" height="4" fill="#fff"/>
        <rect x="4" y="40" width="14" height="3" fill="#0058F8"/>
        <rect x="7" y="40" width="2" height="2" fill="#E8C800"/>
        <rect x="13" y="40" width="2" height="2" fill="#E8C800"/>
        <!-- Legs tucked -->
        <rect x="4" y="43" width="5" height="5" fill="#0058F8"/>
        <rect x="11" y="43" width="5" height="5" fill="#0058F8"/>
        <rect x="3" y="48" width="5" height="3" fill="#804020" rx="1"/>
        <rect x="12" y="48" width="5" height="3" fill="#804020" rx="1"/>
      </g>
    </g>
  </g>
</svg>
