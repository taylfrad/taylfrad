name: Generate Snake
 
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: taylfrad
          outputs: |
            dist/github-snake.svg?color_snake=#30A230&color_dots=#ebedf0,#9be9a8,#40c463,#30A230,#FFD700
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#30A230&color_dots=#0d1117,#1a3a2a,#30A230,#58D858,#FFD700
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
