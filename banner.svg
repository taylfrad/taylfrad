<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150">
  <style>
    @keyframes cloud { 0% { transform: translateX(0); } 100% { transform: translateX(-820px); } }
    @keyframes coin-spin { 0%,100% { transform: scaleX(1); } 50% { transform: scaleX(0.15); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes bump { 0%,88%,100% { transform: translateY(0); } 92% { transform: translateY(-5px); } 96% { transform: translateY(-1px); } }
    @keyframes star { 0%,100% { opacity: 0.1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    .cl { animation: cloud 50s linear infinite; }
    .fl { animation: float 3s ease-in-out infinite; }
    .cs { animation: coin-spin 2s ease-in-out infinite; }
    .bm { animation: bump 5s ease-in-out infinite; }
    .bm1 { animation-delay: 2s; }
    .st { animation: star 4s ease-in-out infinite; }
    .st1 { animation-delay: 1.5s; }
    .st2 { animation-delay: 3s; }
    .bk { animation: blink 1s step-end infinite; }
  </style>

  <rect width="800" height="150" fill="#0d1117"/>

  <!-- Stars -->
  <circle class="st" cx="60" cy="15" r="1.2" fill="#fff"/>
  <circle class="st1" cx="200" cy="10" r="1" fill="#fff"/>
  <circle class="st2" cx="370" cy="8" r="1.3" fill="#fff"/>
  <circle class="st" cx="530" cy="14" r="0.9" fill="#fff"/>
  <circle class="st1" cx="650" cy="6" r="1.1" fill="#fff"/>
  <circle class="st2" cx="760" cy="18" r="1" fill="#fff"/>

  <!-- Clouds -->
  <g class="cl" opacity="0.12">
    <rect x="150" y="22" width="8" height="8" fill="#7FDBCA"/><rect x="158" y="16" width="8" height="14" fill="#7FDBCA"/><rect x="166" y="12" width="14" height="18" fill="#7FDBCA"/><rect x="180" y="16" width="8" height="14" fill="#7FDBCA"/><rect x="188" y="22" width="8" height="8" fill="#7FDBCA"/>
    <rect x="970" y="22" width="8" height="8" fill="#7FDBCA"/><rect x="978" y="16" width="8" height="14" fill="#7FDBCA"/><rect x="986" y="12" width="14" height="18" fill="#7FDBCA"/><rect x="1000" y="16" width="8" height="14" fill="#7FDBCA"/><rect x="1008" y="22" width="8" height="8" fill="#7FDBCA"/>
  </g>
  <g class="cl" opacity="0.08" style="animation-duration:70s">
    <rect x="550" y="30" width="10" height="10" fill="#fff"/><rect x="560" y="22" width="10" height="18" fill="#fff"/><rect x="570" y="18" width="16" height="22" fill="#fff"/><rect x="586" y="22" width="10" height="18" fill="#fff"/><rect x="596" y="30" width="10" height="10" fill="#fff"/>
    <rect x="1370" y="30" width="10" height="10" fill="#fff"/><rect x="1380" y="22" width="10" height="18" fill="#fff"/><rect x="1390" y="18" width="16" height="22" fill="#fff"/><rect x="1406" y="22" width="10" height="18" fill="#fff"/><rect x="1416" y="30" width="10" height="10" fill="#fff"/>
  </g>

  <!-- Question block left -->
  <g class="bm" transform-origin="130 52">
    <rect x="116" y="42" width="28" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5"/>
    <text x="130" y="63" font-family="monospace" font-size="16" font-weight="bold" fill="#C4722A" text-anchor="middle">?</text>
    <circle cx="120" cy="46" r="1.3" fill="#C4722A" opacity="0.4"/><circle cx="140" cy="46" r="1.3" fill="#C4722A" opacity="0.4"/>
    <circle cx="120" cy="66" r="1.3" fill="#C4722A" opacity="0.4"/><circle cx="140" cy="66" r="1.3" fill="#C4722A" opacity="0.4"/>
  </g>
  <g class="fl" transform-origin="130 28"><g class="cs" transform-origin="130 28"><ellipse cx="130" cy="28" rx="6" ry="6" fill="#E8C547" stroke="#C4722A" stroke-width="1"/></g></g>

  <!-- Question block right -->
  <g class="bm bm1" transform-origin="670 52">
    <rect x="656" y="42" width="28" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5"/>
    <text x="670" y="63" font-family="monospace" font-size="16" font-weight="bold" fill="#C4722A" text-anchor="middle">?</text>
    <circle cx="660" cy="46" r="1.3" fill="#C4722A" opacity="0.4"/><circle cx="680" cy="46" r="1.3" fill="#C4722A" opacity="0.4"/>
    <circle cx="660" cy="66" r="1.3" fill="#C4722A" opacity="0.4"/><circle cx="680" cy="66" r="1.3" fill="#C4722A" opacity="0.4"/>
  </g>
  <g class="fl" transform-origin="670 28" style="animation-delay:0.5s"><g class="cs" transform-origin="670 28" style="animation-delay:0.7s"><ellipse cx="670" cy="28" rx="6" ry="6" fill="#E8C547" stroke="#C4722A" stroke-width="1"/></g></g>

  <!-- Pipes — shorter, tucked to edges -->
  <rect x="20" y="80" width="40" height="11" rx="2" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.2"/>
  <rect x="24" y="91" width="32" height="59" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.2"/>
  <rect x="28" y="82" width="5" height="8" fill="#7FDBCA" opacity="0.35" rx="1"/>

  <rect x="740" y="80" width="40" height="11" rx="2" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.2"/>
  <rect x="744" y="91" width="32" height="59" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.2"/>
  <rect x="748" y="82" width="5" height="8" fill="#7FDBCA" opacity="0.35" rx="1"/>

  <!-- Name + subtitle -->
  <text x="400" y="72" font-family="'Press Start 2P','Courier New',monospace" font-size="20" fill="#fff" text-anchor="middle" letter-spacing="2">Taylor Fradella</text>
  <text x="400" y="100" font-family="JetBrains Mono,monospace" font-size="11" fill="#D1D5DB" text-anchor="middle" letter-spacing="1">const passion = "design" + "engineering"</text>
  <rect class="bk" x="518" y="89" width="7" height="12" fill="#E8C547" opacity="0.8"/>
  <text x="400" y="125" font-family="JetBrains Mono,monospace" font-size="9" fill="#6B7280" text-anchor="middle" letter-spacing="1">frontend · full-stack · mobile · accessible</text>
</svg>
