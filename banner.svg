<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes cloud-drift { 0% { transform: translateX(0); } 100% { transform: translateX(-800px); } }
    @keyframes cloud-drift2 { 0% { transform: translateX(0); } 100% { transform: translateX(-800px); } }
    @keyframes coin-spin { 0%,100% { transform: scaleX(1); } 25% { transform: scaleX(0.2); } 50% { transform: scaleX(1); } 75% { transform: scaleX(0.2); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes block-bump { 0%,90%,100% { transform: translateY(0); } 95% { transform: translateY(-5px); } }
    @keyframes sparkle { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes star-pulse { 0%,100% { opacity: 0.15; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }

    .cloud1 { animation: cloud-drift 60s linear infinite; }
    .cloud2 { animation: cloud-drift2 45s linear infinite; }
    .coin { animation: coin-spin 2s ease-in-out infinite; }
    .coin-d1 { animation-delay: 0.5s; }
    .coin-d2 { animation-delay: 1.0s; }
    .coin-d3 { animation-delay: 1.5s; }
    .float { animation: float 3s ease-in-out infinite; }
    .float-d1 { animation-delay: 0.4s; }
    .float-d2 { animation-delay: 0.8s; }
    .block-b { animation: block-bump 6s ease-in-out infinite; }
    .block-b1 { animation-delay: 2s; }
    .block-b2 { animation-delay: 4s; }
    .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    .sp-d1 { animation-delay: 0.5s; }
    .sp-d2 { animation-delay: 1s; }
    .blink { animation: blink 1s step-end infinite; }
    .star-p { animation: star-pulse 3s ease-in-out infinite; }
    .star-p1 { animation-delay: 1s; }
    .star-p2 { animation-delay: 2s; }
  </style>

  <!-- Sky background -->
  <rect width="800" height="200" fill="#0d1117" />

  <!-- Stars in sky -->
  <circle class="star-p" cx="50" cy="20" r="1.5" fill="#ffffff" />
  <circle class="star-p1" cx="180" cy="12" r="1" fill="#ffffff" />
  <circle class="star-p2" cx="350" cy="8" r="1.5" fill="#ffffff" />
  <circle class="star-p" cx="500" cy="18" r="1" fill="#ffffff" />
  <circle class="star-p1" cx="620" cy="10" r="1.5" fill="#ffffff" />
  <circle class="star-p2" cx="750" cy="22" r="1" fill="#ffffff" />
  <circle class="star-p" cx="280" cy="25" r="0.8" fill="#ffffff" />
  <circle class="star-p1" cx="700" cy="30" r="0.8" fill="#ffffff" />

  <!-- Pixel clouds — layer 1 (slow, back) -->
  <g class="cloud2" opacity="0.15">
    <g>
      <rect x="200" y="28" width="8" height="8" fill="#7FDBCA" />
      <rect x="208" y="20" width="8" height="16" fill="#7FDBCA" />
      <rect x="216" y="16" width="16" height="20" fill="#7FDBCA" />
      <rect x="232" y="20" width="8" height="16" fill="#7FDBCA" />
      <rect x="240" y="28" width="8" height="8" fill="#7FDBCA" />
    </g>
    <g>
      <rect x="900" y="28" width="8" height="8" fill="#7FDBCA" />
      <rect x="908" y="20" width="8" height="16" fill="#7FDBCA" />
      <rect x="916" y="16" width="16" height="20" fill="#7FDBCA" />
      <rect x="932" y="20" width="8" height="16" fill="#7FDBCA" />
      <rect x="940" y="28" width="8" height="8" fill="#7FDBCA" />
    </g>
  </g>

  <!-- Pixel clouds — layer 2 (faster, front) -->
  <g class="cloud1" opacity="0.1">
    <g>
      <rect x="550" y="38" width="10" height="10" fill="#ffffff" />
      <rect x="560" y="28" width="10" height="20" fill="#ffffff" />
      <rect x="570" y="24" width="20" height="24" fill="#ffffff" />
      <rect x="590" y="28" width="10" height="20" fill="#ffffff" />
      <rect x="600" y="38" width="10" height="10" fill="#ffffff" />
    </g>
    <g>
      <rect x="1350" y="38" width="10" height="10" fill="#ffffff" />
      <rect x="1360" y="28" width="10" height="20" fill="#ffffff" />
      <rect x="1370" y="24" width="20" height="24" fill="#ffffff" />
      <rect x="1390" y="28" width="10" height="20" fill="#ffffff" />
      <rect x="1400" y="38" width="10" height="10" fill="#ffffff" />
    </g>
  </g>

  <!-- Left pipe -->
  <g>
    <rect x="30" y="100" width="50" height="14" rx="2" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.5" />
    <rect x="35" y="114" width="40" height="66" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.5" />
    <rect x="40" y="102" width="7" height="10" fill="#7FDBCA" opacity="0.4" rx="1" />
    <rect x="40" y="116" width="7" height="60" fill="#7FDBCA" opacity="0.25" rx="1" />
  </g>

  <!-- Right pipe -->
  <g>
    <rect x="720" y="100" width="50" height="14" rx="2" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.5" />
    <rect x="725" y="114" width="40" height="66" fill="#2DD4A8" stroke="#1a9e7a" stroke-width="1.5" />
    <rect x="730" y="102" width="7" height="10" fill="#7FDBCA" opacity="0.4" rx="1" />
    <rect x="730" y="116" width="7" height="60" fill="#7FDBCA" opacity="0.25" rx="1" />
  </g>

  <!-- Question block — left -->
  <g class="block-b">
    <rect x="120" y="55" width="28" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
    <rect x="124" y="59" width="20" height="20" rx="1" fill="none" stroke="#C4722A" stroke-width="0.8" opacity="0.4" />
    <text x="134" y="76" font-family="monospace" font-size="16" font-weight="bold" fill="#C4722A" text-anchor="middle">?</text>
    <circle cx="126" cy="61" r="1.5" fill="#C4722A" opacity="0.5" />
    <circle cx="142" cy="61" r="1.5" fill="#C4722A" opacity="0.5" />
    <circle cx="126" cy="77" r="1.5" fill="#C4722A" opacity="0.5" />
    <circle cx="142" cy="77" r="1.5" fill="#C4722A" opacity="0.5" />
  </g>

  <!-- Question block — right -->
