    <rect x="652" y="55" width="28" height="28" rx="2" fill="#E8C547" stroke="#C4722A" stroke-width="1.5" />
    <rect x="656" y="59" width="20" height="20" rx="1" fill="none" stroke="#C4722A" stroke-width="0.8" opacity="0.4" />
