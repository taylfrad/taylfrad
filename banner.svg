    <circle cx="674" cy="61" r="1.5" fill="#C4722A" opacity="0.5" />
    <circle cx="658" cy="77" r="1.5" fill="#C4722A" opacity="0.5" />
    <circle cx="674" cy="77" r="1.5" fill="#C4722A" opacity="0.5" />
  </g>

  <!-- Brick blocks flanking question blocks -->
  <rect x="92" y="55" width="28" height="28" rx="1" fill="#8B4513" stroke="#6B3410" stroke-width="1" opacity="0.6" />
  <line x1="106" y1="55" x2="106" y2="83" stroke="#6B3410" stroke-width="0.5" opacity="0.4" />
  <line x1="92" y1="69" x2="120" y2="69" stroke="#6B3410" stroke-width="0.5" opacity="0.4" />

  <rect x="680" y="55" width="28" height="28" rx="1" fill="#8B4513" stroke="#6B3410" stroke-width="1" opacity="0.6" />
  <line x1="694" y1="55" x2="694" y2="83" stroke="#6B3410" stroke-width="0.5" opacity="0.4" />
  <line x1="680" y1="69" x2="708" y2="69" stroke="#6B3410" stroke-width="0.5" opacity="0.4" />

  <!-- Floating coins -->
  <g class="float" transform-origin="134 40">
    <g class="coin" transform-origin="134 40">
      <ellipse cx="134" cy="40" rx="7" ry="7" fill="#E8C547" stroke="#C4722A" stroke-width="1" />
      <text x="134" y="44" font-family="monospace" font-size="8" font-weight="bold" fill="#C4722A" text-anchor="middle">$</text>
    </g>
  </g>
  <g class="float float-d1" transform-origin="666 40">
    <g class="coin coin-d1" transform-origin="666 40">
      <ellipse cx="666" cy="40" rx="7" ry="7" fill="#E8C547" stroke="#C4722A" stroke-width="1" />
      <text x="666" y="44" font-family="monospace" font-size="8" font-weight="bold" fill="#C4722A" text-anchor="middle">$</text>
    </g>
  </g>

  <!-- Sparkles -->
  <text class="sparkle" x="155" y="50" font-size="7" fill="#E8C547">✦</text>
  <text class="sparkle sp-d1" x="645" y="45" font-size="7" fill="#E8C547">✦</text>

  <!-- === CENTER CONTENT === -->

  <!-- Name -->
  <text x="400" y="85" font-family="'Press Start 2P', 'Courier New', monospace" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="2">Taylor Fradella</text>

  <!-- Code subtitle -->
  <text x="400" y="115" font-family="JetBrains Mono, monospace" font-size="11" fill="#D1D5DB" text-anchor="middle" letter-spacing="1">const passion = "design" + "engineering"</text>
  <rect class="blink" x="519" y="104" width="7" height="12" fill="#E8C547" opacity="0.8" />

  <!-- Bottom subtitle -->
  <text x="400" y="140" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B7280" text-anchor="middle" letter-spacing="1">frontend · full-stack · mobile · accessible</text>

