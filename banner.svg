<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 156" width="800" height="156">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#8B5CF6" stop-opacity=".08"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFA040" stop-opacity=".06"/><stop offset="100%" stop-color="#FFA040" stop-opacity="0"/></radialGradient>

    <!-- PIPE SYMBOL — pixel-accurate vertical stripes, black outline -->
    <symbol id="pipe" viewBox="0 0 44 70">
      <!-- Rim (wider) -->
      <rect x="0" y="0" width="44" height="12" fill="#000" rx="1"/>
      <rect x="1" y="1" width="42" height="10" fill="#00A800"/>
      <rect x="2" y="1" width="6" height="10" fill="#008800"/><!-- dark left -->
      <rect x="8" y="1" width="6" height="10" fill="#00A800"/>
      <rect x="14" y="1" width="4" height="10" fill="#30C830"/>
      <rect x="18" y="1" width="4" height="10" fill="#58E858"/><!-- highlight -->
      <rect x="22" y="1" width="6" height="10" fill="#30C830"/>
      <rect x="28" y="1" width="6" height="10" fill="#00A800"/>
      <rect x="34" y="1" width="4" height="10" fill="#008800"/>
      <rect x="38" y="1" width="4" height="10" fill="#006000"/><!-- darkest right -->
      <!-- Body (narrower) -->
      <rect x="4" y="12" width="36" height="58" fill="#000"/>
      <rect x="5" y="12" width="34" height="58" fill="#00A800"/>
      <rect x="6" y="12" width="4" height="58" fill="#008800"/>
      <rect x="10" y="12" width="5" height="58" fill="#00A800"/>
      <rect x="15" y="12" width="4" height="58" fill="#30C830"/>
      <rect x="19" y="12" width="3" height="58" fill="#58E858"/><!-- highlight stripe -->
      <rect x="22" y="12" width="5" height="58" fill="#30C830"/>
      <rect x="27" y="12" width="5" height="58" fill="#00A800"/>
      <rect x="32" y="12" width="4" height="58" fill="#008800"/>
      <rect x="36" y="12" width="3" height="58" fill="#006000"/>
    </symbol>

    <!-- QUESTION BLOCK SYMBOL — golden with white ?, dark rivets -->
    <symbol id="qblock" viewBox="0 0 28 28">
      <rect width="28" height="28" fill="#000" rx="2"/>
      <rect x="1" y="1" width="26" height="26" fill="#F0C800" rx="1"/>
      <rect x="2" y="2" width="24" height="24" fill="#E8B800" rx="1"/>
      <rect x="1" y="1" width="26" height="2" fill="#F8E060"/><!-- top highlight -->
      <rect x="1" y="1" width="2" height="26" fill="#F8E060"/><!-- left highlight -->
      <!-- White ? mark (blocky/pixel style) -->
      <rect x="9" y="6" width="10" height="3" fill="#fff"/>
      <rect x="16" y="6" width="3" height="8" fill="#fff"/>
      <rect x="11" y="12" width="8" height="3" fill="#fff"/>
      <rect x="11" y="12" width="3" height="6" fill="#fff"/>
      <rect x="11" y="20" width="3" height="3" fill="#fff"/>
      <!-- Corner rivets -->
      <circle cx="5" cy="5" r="2" fill="#A08000"/><circle cx="23" cy="5" r="2" fill="#A08000"/>
      <circle cx="5" cy="23" r="2" fill="#A08000"/><circle cx="23" cy="23" r="2" fill="#A08000"/>
    </symbol>

    <!-- COIN SYMBOL — SMW sprite (PNG) -->
    <symbol id="coin" viewBox="0 0 84 96">
      <image width="84" height="96" style="image-rendering:pixelated" href="data:image/png;base64," />
    </symbol>

    <!-- BRICK SYMBOL -->
    <symbol id="brick" viewBox="0 0 16 16">
      <rect width="16" height="16" fill="#000"/>
      <rect x="1" y="1" width="14" height="6" fill="#C06818"/>
      <rect x="1" y="9" width="6" height="6" fill="#C06818"/>
      <rect x="9" y="9" width="6" height="6" fill="#C06818"/>
      <!-- Mortar lines are the gaps (black bg showing through) -->
      <!-- Highlight edges -->
      <rect x="1" y="1" width="14" height="1" fill="#E89050" opacity=".6"/>
      <rect x="1" y="9" width="6" height="1" fill="#E89050" opacity=".6"/>
      <rect x="9" y="9" width="6" height="1" fill="#E89050" opacity=".6"/>
    </symbol>

    <clipPath id="pipe-clip-r">
      <rect x="730" y="0" width="60" height="82"/>
    </clipPath>
  </defs>

  <style>
    @keyframes cloud{0%{transform:translateX(0)}100%{transform:translateX(-820px)}}
    @keyframes cs{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.15)}}
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes bm{0%,88%,100%{transform:translateY(0)}92%{transform:translateY(-6px)}96%{transform:translateY(-1px)}}
    @keyframes bk{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes amb{0%,100%{opacity:.04}50%{opacity:.1}}
    @keyframes twinkle{0%,100%{opacity:.12}30%{opacity:.18}50%{opacity:.55}70%{opacity:.2}}
    @keyframes twinkle2{0%,100%{opacity:.1}40%{opacity:.15}60%{opacity:.45}80%{opacity:.12}}
    @keyframes twinkle3{0%,100%{opacity:.15}20%{opacity:.5}50%{opacity:.12}80%{opacity:.4}}
    @keyframes piranha{0%,35%{transform:translateY(45px)}50%{transform:translateY(0)}65%{transform:translateY(0)}80%,100%{transform:translateY(45px)}}

    .cl{animation:cloud 50s linear infinite}
    .fl{animation:fl 3s ease-in-out infinite}.fl1{animation-delay:.5s}
    .cs{animation:cs 2s ease-in-out infinite}.cs1{animation-delay:.7s}
    .bm{animation:bm 5s ease-in-out infinite}.bm1{animation-delay:2s}
    .bk{animation:bk 1s step-end infinite}
    .amb{animation:amb 6s ease-in-out infinite}
    .tw{animation:twinkle 8s ease-in-out infinite}
    .tw1{animation:twinkle2 10s ease-in-out infinite .8s}
    .tw2{animation:twinkle3 7s ease-in-out infinite 1.6s}
    .tw3{animation:twinkle 12s ease-in-out infinite 2.4s}
    .tw4{animation:twinkle2 9s ease-in-out infinite 3.2s}
    .tw5{animation:twinkle3 11s ease-in-out infinite 0s}
    .tw6{animation:twinkle 14s ease-in-out infinite 4s}
    .tw7{animation:twinkle2 8s ease-in-out infinite 1.2s}
    .tw8{animation:twinkle3 13s ease-in-out infinite 5s}
    .pir{animation:piranha 4.5s ease-in-out infinite}
  </style>

  <!-- Night sky -->
  <rect width="800" height="150" fill="#050c21"/>
  <ellipse class="amb" cx="200" cy="80" rx="150" ry="100" fill="url(#g1)"/>
  <ellipse class="amb" cx="600" cy="70" rx="140" ry="90" fill="url(#g2)" style="animation-delay:3s"/>

  <!-- Twinkling stars — densely scattered across the night sky -->
  <!-- Bright cross-shaped stars -->
  <g class="tw" transform-origin="60 15"><line x1="58" y1="15" x2="62" y2="15" stroke="#fff" stroke-width=".4" opacity=".6"/><line x1="60" y1="13" x2="60" y2="17" stroke="#fff" stroke-width=".4" opacity=".6"/><circle cx="60" cy="15" r="1" fill="#fff"/></g>
  <g class="tw tw2" transform-origin="370 8"><line x1="368" y1="8" x2="372" y2="8" stroke="#fff" stroke-width=".4" opacity=".5"/><line x1="370" y1="6" x2="370" y2="10" stroke="#fff" stroke-width=".4" opacity=".5"/><circle cx="370" cy="8" r="1" fill="#fff"/></g>
  <g class="tw tw4" transform-origin="650 6"><line x1="648" y1="6" x2="652" y2="6" stroke="#fff" stroke-width=".3" opacity=".5"/><line x1="650" y1="4" x2="650" y2="8" stroke="#fff" stroke-width=".3" opacity=".5"/><circle cx="650" cy="6" r=".9" fill="#fff"/></g>
  <g class="tw tw7" transform-origin="255 5"><line x1="253" y1="5" x2="257" y2="5" stroke="#fff" stroke-width=".3" opacity=".5"/><line x1="255" y1="3" x2="255" y2="7" stroke="#fff" stroke-width=".3" opacity=".5"/><circle cx="255" cy="5" r=".8" fill="#fff"/></g>
  <g class="tw tw3" transform-origin="510 18"><line x1="508" y1="18" x2="512" y2="18" stroke="#C4B5FD" stroke-width=".3" opacity=".4"/><line x1="510" y1="16" x2="510" y2="20" stroke="#C4B5FD" stroke-width=".3" opacity=".4"/><circle cx="510" cy="18" r=".7" fill="#C4B5FD"/></g>

  <!-- Medium dot stars -->
  <circle class="tw tw1" cx="200" cy="10" r=".8" fill="#C4B5FD"/>
  <circle class="tw tw3" cx="530" cy="14" r=".7" fill="#C4B5FD"/>
  <circle class="tw tw5" cx="760" cy="18" r=".6" fill="#C4B5FD"/>
  <circle class="tw tw6" cx="120" cy="22" r=".5" fill="#FF8DC7"/>
  <circle class="tw tw7" cx="450" cy="12" r=".8" fill="#fff"/>
  <circle class="tw tw8" cx="310" cy="20" r=".5" fill="#FFD700"/>
  <circle class="tw tw1" cx="490" cy="6" r=".5" fill="#fff"/>
  <circle class="tw tw4" cx="30" cy="10" r=".7" fill="#fff"/>
  <circle class="tw tw2" cx="170" cy="28" r=".6" fill="#fff"/>
  <circle class="tw tw8" cx="580" cy="4" r=".7" fill="#C4B5FD"/>
  <circle class="tw tw5" cx="420" cy="22" r=".5" fill="#fff"/>
  <circle class="tw tw3" cx="720" cy="14" r=".6" fill="#fff"/>

  <!-- Small scattered dots for depth -->
  <circle class="tw tw3" cx="85" cy="8" r=".4" fill="#fff"/>
  <circle class="tw tw5" cx="270" cy="16" r=".3" fill="#C4B5FD"/>
  <circle class="tw tw7" cx="590" cy="20" r=".3" fill="#C4B5FD"/>
  <circle class="tw tw2" cx="710" cy="10" r=".4" fill="#fff"/>
  <circle class="tw tw8" cx="40" cy="28" r=".3" fill="#FF8DC7"/>
  <circle class="tw tw6" cx="780" cy="8" r=".4" fill="#fff"/>
  <circle class="tw tw1" cx="145" cy="6" r=".3" fill="#fff"/>
  <circle class="tw tw4" cx="335" cy="14" r=".35" fill="#C4B5FD"/>
  <circle class="tw tw6" cx="475" cy="3" r=".3" fill="#fff"/>
  <circle class="tw tw2" cx="555" cy="25" r=".35" fill="#fff"/>
  <circle class="tw tw8" cx="625" cy="12" r=".3" fill="#C4B5FD"/>
  <circle class="tw tw3" cx="695" cy="22" r=".35" fill="#FF8DC7"/>
  <circle class="tw tw5" cx="15" cy="18" r=".3" fill="#fff"/>
  <circle class="tw tw1" cx="100" cy="32" r=".3" fill="#C4B5FD"/>
  <circle class="tw tw7" cx="230" cy="24" r=".3" fill="#fff"/>
  <circle class="tw tw4" cx="350" cy="30" r=".25" fill="#fff"/>
  <circle class="tw tw6" cx="410" cy="5" r=".3" fill="#C4B5FD"/>
  <circle class="tw tw2" cx="540" cy="30" r=".25" fill="#fff"/>
  <circle class="tw tw8" cx="670" cy="28" r=".3" fill="#fff"/>
  <circle class="tw tw3" cx="750" cy="30" r=".25" fill="#C4B5FD"/>
  <circle class="tw tw5" cx="790" cy="25" r=".3" fill="#fff"/>
  <circle class="tw tw1" cx="300" cy="4" r=".3" fill="#fff"/>
  <circle class="tw tw7" cx="160" cy="16" r=".25" fill="#FFD700"/>

  <!-- Clouds -->
  <g class="cl" opacity=".08">
    <rect x="150" y="22" width="8" height="8" fill="#C4B5FD"/><rect x="158" y="16" width="8" height="14" fill="#C4B5FD"/><rect x="166" y="12" width="14" height="18" fill="#C4B5FD"/><rect x="180" y="16" width="8" height="14" fill="#C4B5FD"/><rect x="188" y="22" width="8" height="8" fill="#C4B5FD"/>
    <rect x="970" y="22" width="8" height="8" fill="#C4B5FD"/><rect x="978" y="16" width="8" height="14" fill="#C4B5FD"/><rect x="986" y="12" width="14" height="18" fill="#C4B5FD"/><rect x="1000" y="16" width="8" height="14" fill="#C4B5FD"/><rect x="1008" y="22" width="8" height="8" fill="#C4B5FD"/>
  </g>

  <!-- Brick blocks flanking question blocks -->
  <use href="#brick" x="90" y="46" width="16" height="16"/>
  <use href="#brick" x="106" y="46" width="16" height="16"/>
  <use href="#brick" x="688" y="46" width="16" height="16"/>
  <use href="#brick" x="704" y="46" width="16" height="16"/>

  <!-- Question block LEFT — bumping animation -->
  <g class="bm" transform-origin="136 54">
    <use href="#qblock" x="122" y="42" width="28" height="28"/>
  </g>
  <!-- Coin popping from left block -->
  <g class="fl" transform-origin="136 28"><g class="cs" transform-origin="136 28"><use href="#coin" x="130" y="21" width="12" height="14"/></g></g>

  <!-- Question block RIGHT — bumping animation -->
  <g class="bm bm1" transform-origin="668 54">
    <use href="#qblock" x="654" y="42" width="28" height="28"/>
  </g>
  <!-- Coin popping from right block -->
  <g class="fl fl1" transform-origin="668 28"><g class="cs cs1" transform-origin="668 28"><use href="#coin" x="662" y="21" width="12" height="14"/></g></g>

  <!-- LEFT PIPE — pixel-accurate -->
  <use href="#pipe" x="18" y="80" width="44" height="70"/>

  <!-- RIGHT PIPE — pixel-accurate -->
  <use href="#pipe" x="738" y="80" width="44" height="70"/>

  <!-- PIRANHA PLANT — SMW sprite (PNG), clipped to pipe opening -->
  <g clip-path="url(#pipe-clip-r)">
    <g class="pir" transform-origin="760 72">
      <image x="742" y="35" width="36" height="55" style="image-rendering:pixelated" href="data:image/png;base64," />
    </g>
  </g>

  <!-- ========== TEXT ========== -->
  <text x="400" y="72" font-family="'Press Start 2P','Courier New',monospace" font-size="20" fill="#fff" text-anchor="middle" letter-spacing="2">Taylor Fradella</text>
  <text x="400" y="100" font-family="JetBrains Mono,monospace" font-size="11" fill="#C4B5FD" text-anchor="middle" letter-spacing="1">const passion = "design" + "engineering"</text>
  <rect class="bk" x="543" y="89" width="7" height="12" fill="#FFD700" opacity=".8"/>
  <text x="400" y="120" font-family="JetBrains Mono,monospace" font-size="9" fill="#8B7FBA" text-anchor="middle" letter-spacing="1">frontend · full-stack</text>

  <!-- GROUND — matching game-scene style -->
  <rect x="0" y="128" width="800" height="2" fill="#000"/>
  <rect x="0" y="130" width="800" height="5" fill="#00E800"/>
  <rect x="0" y="130" width="800" height="2" fill="#40F840"/>
  <rect x="15" y="127" width="6" height="4" fill="#00E800"/><rect x="55" y="126" width="8" height="5" fill="#00C800"/>
  <rect x="120" y="127" width="5" height="4" fill="#00E800"/><rect x="185" y="126" width="7" height="5" fill="#00C800"/>
  <rect x="250" y="127" width="6" height="4" fill="#00E800"/><rect x="320" y="126" width="8" height="5" fill="#00C800"/>
  <rect x="390" y="127" width="5" height="4" fill="#00E800"/><rect x="460" y="126" width="7" height="5" fill="#00C800"/>
  <rect x="530" y="127" width="6" height="4" fill="#00E800"/><rect x="600" y="126" width="8" height="5" fill="#00C800"/>
  <rect x="670" y="127" width="5" height="4" fill="#00E800"/><rect x="740" y="126" width="7" height="5" fill="#00C800"/>
  <rect x="0" y="135" width="800" height="3" fill="#000"/>
  <rect x="0" y="135" width="30" height="3" fill="#008800"/><rect x="40" y="135" width="50" height="3" fill="#006800"/>
  <rect x="100" y="135" width="35" height="3" fill="#008800"/><rect x="150" y="135" width="45" height="3" fill="#006800"/>
  <rect x="210" y="135" width="30" height="3" fill="#008800"/><rect x="260" y="135" width="50" height="3" fill="#006800"/>
  <rect x="330" y="135" width="35" height="3" fill="#008800"/><rect x="380" y="135" width="40" height="3" fill="#006800"/>
  <rect x="440" y="135" width="30" height="3" fill="#008800"/><rect x="490" y="135" width="50" height="3" fill="#006800"/>
  <rect x="560" y="135" width="35" height="3" fill="#008800"/><rect x="610" y="135" width="40" height="3" fill="#006800"/>
  <rect x="670" y="135" width="30" height="3" fill="#008800"/><rect x="720" y="135" width="50" height="3" fill="#006800"/>
  <rect x="0" y="138" width="800" height="2" fill="#806830"/>
  <rect x="0" y="140" width="800" height="10" fill="#C8A868"/>
  <rect x="70" y="142" width="6" height="3" fill="#D0C060" opacity=".5"/>
  <rect x="350" y="143" width="5" height="3" fill="#A0A040" opacity=".4"/>
  <rect x="600" y="142" width="7" height="3" fill="#D0C060" opacity=".5"/>
  <!-- Bleed strip — fills any inline gap below banner -->
  <rect x="0" y="150" width="800" height="6" fill="#050c21"/>
</svg>
